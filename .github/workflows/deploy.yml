name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build Frontend ──────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # ── Build Backend ───────────────────────────────
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate

      - name: Compile TypeScript
        run: |
          cd backend
          npx tsc

      # ── Copy frontend dist to backend/public ───────
      - name: Copy Frontend Build
        run: |
          rm -rf backend/public
          cp -r frontend/dist backend/public

      # ── Deploy via FTP ──────────────────────────────
      # Deploys the entire backend/ folder (including dist/, public/, prisma/, node_modules/)
      # The Hostinger Node.js app should point to: dist/index.js
      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/src/**
            **/.env.example
            **/tsconfig.json
          dangerous-clean-slate: false
